<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界地理學習地圖</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
/* ═══════════ RESET & BASE ═══════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,sans-serif;
  background:#0c1622;color:#e8e0d0;height:100vh;display:flex;flex-direction:column;
  overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* ═══════════ HEADER ═══════════ */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  height:50px;flex-shrink:0;
  background:linear-gradient(90deg,#131f35 0%,#172840 100%);
  border-bottom:1px solid rgba(255,255,255,.07);
  box-shadow:0 2px 12px rgba(0,0,0,.35)}
.logo{font-size:14px;font-weight:700;color:#e8c870;display:flex;align-items:center;gap:8px;
  letter-spacing:.02em}
.logo span{font-size:11px;font-weight:400;color:#4a7a9a;letter-spacing:.5px}
.tabs{display:flex;background:rgba(0,0,0,.28);border-radius:10px;padding:3px;gap:2px;
  border:1px solid rgba(255,255,255,.06)}
.tab{padding:6px 18px;border-radius:7px;border:none;background:transparent;color:#4a7a9a;
  font-size:12px;cursor:pointer;font-family:inherit;transition:all .22s;letter-spacing:.02em}
.tab.on{background:linear-gradient(135deg,#d4a340,#c48840);color:#0c1622;
  font-weight:700;box-shadow:0 2px 10px rgba(200,144,80,.45);letter-spacing:0}

/* ═══════════ REGION BAR ═══════════ */
.rbar{display:flex;align-items:center;gap:5px;padding:6px 18px;
  background:#0f1a2a;border-bottom:1px solid rgba(255,255,255,.06);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.rbar::-webkit-scrollbar{display:none}
.rp{padding:4px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.09);
  background:transparent;color:#4a7a9a;font-size:11px;cursor:pointer;
  font-family:inherit;white-space:nowrap;transition:all .18s;letter-spacing:.01em}
.rp.on{border-color:#c89050;color:#f0d090;background:rgba(200,144,80,.13);
  box-shadow:0 0 8px rgba(200,144,80,.2)}
.rp:hover:not(.on){border-color:rgba(255,255,255,.22);color:#c8d8e8;
  background:rgba(255,255,255,.04)}
.cnt{margin-left:auto;font-size:10px;color:#304a60;padding:3px 10px;
  border:1px solid rgba(255,255,255,.07);border-radius:12px;
  white-space:nowrap;flex-shrink:0;letter-spacing:.02em}

/* ═══════════ MAIN LAYOUT ═══════════ */
.main{display:flex;flex:1;overflow:hidden}

/* ═══════════ MAP ═══════════ */
#mwrap{flex:1;position:relative;overflow:hidden;background:#162e48;cursor:grab}
#mwrap:active{cursor:grabbing}
#msvg{width:100%;height:100%;display:block}
.cp{stroke:none;cursor:pointer;transition:fill .35s,opacity .35s,filter .2s;vector-effect:non-scaling-stroke}
.cp.hov{stroke:#f0d070;stroke-width:1.2;filter:url(#glow-hov) brightness(1.18)}
.cp.sel{stroke:#f0c840;stroke-width:1.6;filter:url(#glow-sel)}
.cp.hl{stroke:#ffa040;stroke-width:2;filter:url(#glow-quiz)}
.cp.dim{opacity:.11}
.border-mesh,.a1p{vector-effect:non-scaling-stroke}

/* ═══════════ TOOLTIP ═══════════ */
#tip{position:absolute;background:rgba(10,20,36,.96);border:1px solid rgba(255,255,255,.14);
  border-radius:10px;padding:8px 14px;font-size:12px;color:#e8e0d0;pointer-events:none;
  opacity:0;transition:opacity .1s;z-index:50;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.6);backdrop-filter:blur(10px)}

/* ═══════════ LAYERS PANEL ═══════════ */
#layers-wrap{position:absolute;top:12px;left:12px;z-index:40;
  background:rgba(8,16,28,.92);border:1px solid rgba(255,255,255,.12);
  border-radius:11px;padding:10px 11px;backdrop-filter:blur(12px);
  display:flex;flex-direction:column;gap:5px;min-width:118px;
  box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}
.lw-top{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:3px;padding-bottom:7px;
  border-bottom:1px solid rgba(255,255,255,.07)}
.ltitle{font-size:10px;color:#3a6a8a;text-transform:uppercase;letter-spacing:1px;
  font-weight:600}
.lbtn-sm{width:26px;height:26px;border-radius:7px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
  color:#7aaac8;font-size:13px;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center}
.lbtn-sm:hover{color:#e8e0d0;border-color:rgba(255,255,255,.28);
  background:rgba(255,255,255,.1)}
.lbtn{padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.08);
  background:transparent;color:#3a6a8a;font-size:11px;cursor:pointer;
  font-family:inherit;text-align:left;transition:all .18s;white-space:nowrap;
  letter-spacing:.01em}
.lbtn.on{border-color:rgba(90,160,230,.45);color:#80c0f0;
  background:rgba(90,160,230,.12);box-shadow:0 0 8px rgba(90,160,230,.1)}
.lbtn:hover:not(.on){color:#c8d8e8;border-color:rgba(255,255,255,.2);
  background:rgba(255,255,255,.05)}

/* ═══════════ RIGHT PANEL ═══════════ */
#panel{width:300px;flex-shrink:0;border-left:1px solid rgba(255,255,255,.07);
  background:#111e2e;display:flex;flex-direction:column;overflow:hidden}
.ptabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;background:#162030}
.ptab{flex:1;padding:10px 6px;border:none;border-bottom:2px solid transparent;
  background:transparent;color:#4a7a9a;font-size:12px;cursor:pointer;
  font-family:inherit;transition:all .2s;letter-spacing:.01em}
.ptab.on{color:#f0d090;border-bottom-color:#c89050}
.ptab:hover:not(.on){color:#c8d8e8;background:rgba(255,255,255,.03)}

/* ─ Loading ─ */
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:absolute;inset:0;gap:14px;color:#4a7a9a;font-size:13px;
  background:#162e48;z-index:30}
.spin{width:32px;height:32px;border:2.5px solid rgba(255,255,255,.1);
  border-top-color:#c89050;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─ Empty state ─ */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:28px;text-align:center;color:#304a60}
.empty .ico{font-size:42px;opacity:.25}
.empty p{font-size:12.5px;line-height:1.7;color:#3a5a78}

/* ─ Country info ─ */
.info{flex:1;overflow-y:auto;display:flex;flex-direction:column;
  animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.info-hero{padding:22px 16px 16px;text-align:center;
  background:linear-gradient(180deg,#1a3050 0%,#111e2e 100%)}
.flag-big{font-size:60px;line-height:1;margin-bottom:12px;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.55))}
.name-zh{font-size:21px;font-weight:700;color:#f0d090;margin-bottom:3px;
  letter-spacing:.02em}
.name-en{font-size:10px;color:#4a7a9a;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:11px}
.rgn-badge{display:inline-flex;align-items:center;padding:3px 13px;
  border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.02em}
.info-body{padding:14px 16px;display:flex;flex-direction:column;gap:13px;flex:1}
.info-row{display:flex;gap:12px;align-items:flex-start}
.info-ico{font-size:15px;width:22px;flex-shrink:0;margin-top:1px}
.info-lbl{font-size:9.5px;color:#304a60;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:3px}
.info-val{font-size:13.5px;color:#e8e0d0;font-weight:500}
.ltags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.lt{font-size:11px;padding:3px 10px;border-radius:10px;
  border:1px solid rgba(200,144,80,.28);color:#d4a840;
  background:rgba(200,144,80,.09)}
.dvd{height:1px;background:rgba(255,255,255,.06)}
.info-footer{padding:12px 16px 16px}
.quiz-here-btn{width:100%;padding:9px;border-radius:9px;
  border:1px solid rgba(200,144,80,.28);background:rgba(200,144,80,.07);
  color:#d4a840;font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.quiz-here-btn:hover{background:rgba(200,144,80,.18);border-color:rgba(200,144,80,.5);
  color:#f0c060;transform:translateY(-1px)}
.backb{display:inline-flex;align-items:center;gap:5px;background:transparent;
  border:1px solid rgba(255,255,255,.1);color:#4a7a9a;font-size:11px;
  padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;
  transition:all .18s;margin-bottom:6px}
.backb:hover{color:#e8e0d0;border-color:rgba(255,255,255,.22)}

/* ─ Country list ─ */
.list-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sinp-wrap{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sinp{width:100%;padding:8px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:#e8e0d0;font-size:12px;font-family:inherit;outline:none;
  transition:all .2s}
.sinp::placeholder{color:#304a60}
.sinp:focus{border-color:#c89050;box-shadow:0 0 0 3px rgba(200,144,80,.12)}
.clist{flex:1;overflow-y:auto;padding:5px}
.cli{display:flex;align-items:center;gap:10px;padding:8px 10px 8px 13px;
  border-radius:8px;cursor:pointer;transition:background .15s,border-color .18s;
  border-left:2.5px solid transparent}
.cli:hover{background:rgba(255,255,255,.05);border-left-color:var(--rgc,#506070)}
.cli-fl{font-size:22px;flex-shrink:0;line-height:1}
.cli-tx{flex:1;min-width:0}
.cli-nm{font-size:13px;font-weight:500;color:#e8e0d0}
.cli-sb{font-size:11px;color:#304a60;margin-top:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cli-ar{color:#263a50;flex-shrink:0;font-size:14px}

/* ─ Quiz setup ─ */
.qsetup{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.qsetup-title{font-size:15px;font-weight:700;color:#f0d090;letter-spacing:.02em}
.slbl{font-size:9.5px;color:#304a60;text-transform:uppercase;
  letter-spacing:.9px;margin-bottom:6px;font-weight:600}
.sopts{display:flex;flex-direction:column;gap:5px}
.so{padding:9px 13px;border:1px solid rgba(255,255,255,.08);border-radius:9px;
  background:rgba(255,255,255,.03);color:#4a7a9a;font-size:12px;cursor:pointer;
  font-family:inherit;text-align:left;display:flex;align-items:center;gap:9px;
  transition:all .15s}
.so.pk{border-color:rgba(74,158,232,.45);color:#88c8f8;
  background:rgba(74,158,232,.1);box-shadow:0 0 0 1px rgba(74,158,232,.18)}
.so:hover:not(.pk){border-color:rgba(255,255,255,.18);color:#c8d8e8;
  background:rgba(255,255,255,.05)}
.startb{padding:11px;border-radius:9px;border:none;
  background:linear-gradient(135deg,#d4a340,#c48840);color:#0c1622;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-top:auto;transition:all .2s;
  box-shadow:0 4px 16px rgba(200,144,80,.35)}
.startb:hover{box-shadow:0 6px 22px rgba(200,144,80,.55);transform:translateY(-1px)}
.startb:active{transform:translateY(0)}

/* ─ Quiz question ─ */
.qhdr{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:#162030}
.sc{font-size:11px;color:#4a7a9a}
.scn{font-weight:700;color:#e8e0d0;font-size:14px}
.strk{font-size:11px;padding:2px 9px;border-radius:10px;
  background:rgba(255,200,60,.14);color:#ffcc3c;
  border:1px solid rgba(255,200,60,.2)}
.quitb{border:1px solid rgba(255,255,255,.1);background:transparent;
  color:#4a7a9a;font-size:11px;padding:4px 10px;border-radius:6px;
  cursor:pointer;font-family:inherit;transition:all .18s}
.quitb:hover{color:#f07070;border-color:rgba(240,112,112,.3)}
.pgbar{height:6px;background:rgba(255,255,255,.07);flex-shrink:0;overflow:hidden}
.pgfill{height:100%;background:linear-gradient(90deg,#c89050,#f0d060);
  transition:width .55s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(200,144,80,.6)}
.qbody{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden}
.qtlbl{font-size:9.5px;color:#304a60;text-transform:uppercase;letter-spacing:.9px;
  font-weight:600}
.qtxt{font-size:14px;font-weight:600;color:#e8e0d0;line-height:1.45}
.hint{font-size:11px;color:#d48830;display:flex;align-items:center;gap:5px;
  padding:6px 9px;background:rgba(212,136,48,.08);border-radius:7px;
  border:1px solid rgba(212,136,48,.18)}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;align-content:start}
.ob{padding:10px 8px;border:1px solid rgba(255,255,255,.1);border-radius:9px;
  background:rgba(255,255,255,.04);color:#e8e0d0;font-family:inherit;
  font-size:12px;cursor:pointer;text-align:center;line-height:1.35;
  transition:all .15s;word-break:break-word}
.ob:hover:not(:disabled){border-color:rgba(200,144,80,.45);color:#f0d090;
  background:rgba(200,144,80,.12)}
.ob.flgo{font-size:28px;padding:12px 8px}
.ob.ok{border-color:rgba(78,205,160,.45);background:rgba(78,205,160,.12);
  color:#5dd4a8;font-weight:600}
.ob.ng{border-color:rgba(232,80,80,.45);background:rgba(232,80,80,.12);color:#f07070}
.fb{padding:10px 12px;border-radius:9px;font-size:12px;display:flex;
  align-items:flex-start;gap:9px;line-height:1.45;animation:fb-in .2s ease}
@keyframes fb-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fb.ok{background:rgba(78,205,160,.09);border:1px solid rgba(78,205,160,.22);color:#5dd4a8}
.fb.ng{background:rgba(232,80,80,.09);border:1px solid rgba(232,80,80,.22);color:#f07070}
.nxtb{padding:9px;border:1px solid rgba(255,255,255,.12);border-radius:9px;
  background:rgba(255,255,255,.04);color:#e8e0d0;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s;width:100%;
  display:flex;align-items:center;justify-content:center;gap:6px}
.nxtb:hover{background:rgba(200,144,80,.12);border-color:rgba(200,144,80,.4);color:#f0d090}

/* ─ Quiz result ─ */
.rspanel{flex:1;padding:24px 18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;text-align:center}
.rsico{font-size:52px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.rsscore{font-size:34px;font-weight:700;color:#f0d090}
.rspct{font-size:13px;color:#4a7a9a}
.rsmsg{font-size:13.5px;color:#e8e0d0;line-height:1.55}
.actbtns{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:10px}
.ab{padding:10px;border-radius:9px;font-size:13px;cursor:pointer;
  font-family:inherit;transition:all .2s;width:100%;letter-spacing:.01em}
.ab.prim{background:linear-gradient(135deg,#d4a340,#c48840);border:none;
  color:#0c1622;font-weight:700;box-shadow:0 3px 12px rgba(200,144,80,.3)}
.ab.prim:hover{box-shadow:0 5px 18px rgba(200,144,80,.5);transform:translateY(-1px)}
.ab.sec{background:transparent;border:1px solid rgba(255,255,255,.1);color:#4a7a9a}
.ab.sec:hover{color:#e8e0d0;border-color:rgba(255,255,255,.22)}

/* ─ Map labels ─ */
.lb{fill:rgba(255,255,255,.95);stroke:rgba(8,18,35,.92);stroke-width:2.5;
  paint-order:stroke;font-weight:600;letter-spacing:.02em;
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  pointer-events:none}
.lb.dim{opacity:.1}
.wlbl{font-style:italic;paint-order:stroke;stroke:rgba(10,28,55,.88);
  stroke-width:2.5;pointer-events:none;
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;font-weight:300}
.wlbl-ocean{fill:rgba(155,198,232,.78);letter-spacing:4px;font-size:14px}
.wlbl-sea{fill:rgba(140,188,225,.75);letter-spacing:1.5px}
.wlbl-lake{fill:rgba(130,180,220,.72);letter-spacing:.5px;font-style:normal;font-weight:400}
.clb{fill:#f5dfa0;stroke:rgba(8,18,32,.9);stroke-width:2;paint-order:stroke;
  font-weight:500;letter-spacing:.02em;
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  pointer-events:none}

/* ─ Scrollbar ─ */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
</style>
</head>
<body>
<header>
  <div class="logo">🗺️ 世界地理學習地圖 <span>Mercator 投影</span></div>
  <div class="tabs">
    <button class="tab on" id="tlearn" onclick="setMode('learn')">🎓 學習模式</button>
    <button class="tab" id="tquiz" onclick="setMode('quiz')">⚡ 測驗模式</button>
  </div>
</header>
<div class="rbar" id="rbar">
  <button class="rp on" onclick="setRegion(this,'all')">🌍 全球</button>
  <button class="rp" onclick="setRegion(this,'asia')">亞洲</button>
  <button class="rp" onclick="setRegion(this,'europe')">歐洲</button>
  <button class="rp" onclick="setRegion(this,'africa')">非洲</button>
  <button class="rp" onclick="setRegion(this,'na')">北美洲</button>
  <button class="rp" onclick="setRegion(this,'sa')">南美洲</button>
  <button class="rp" onclick="setRegion(this,'oc')">大洋洲</button>
  <span class="cnt" id="cntb">—</span>
</div>
<div class="main">
  <div id="mwrap">
    <svg id="msvg"></svg>
    <div id="tip"></div>
    <div id="layers-wrap">
      <div class="lw-top">
        <span class="ltitle">圖層控制</span>
        <button class="lbtn-sm" onclick="resetZoom()" title="縮放全圖">⊕</button>
      </div>
      <button class="lbtn on" id="lblbtn" data-layer="labels" onclick="toggleLabels()">📍 國名標籤</button>
      <button class="lbtn on" data-layer="cities" onclick="toggleLayer('cities')">🏛 首都名稱</button>
      <button class="lbtn" data-layer="timezone" onclick="toggleLayer('timezone')">🕐 UTC 時區</button>
    </div>
    <div class="ldg" id="ldg"><div class="spin"></div><span>載入地圖資料…</span></div>
  </div>
  <div id="panel"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   重要：world-atlas topojson 的 ID 是帶前導零的字串
   例如 "004"（阿富汗）、"032"（阿根廷）、"840"（美國）
   所以查表必須用 parseInt(id, 10) 或 +id 把 "004" 轉成 4
   這是先前版本所有「無資料」問題的根本原因
   ══════════════════════════════════════════════════════════ */

/* ── 國家資料（台灣外交部官方譯名）──────────────────────
   格式：[中文名, 英文名, 國旗, 首都, [語言], 地區]
   地區代號：asia / europe / africa / na / sa / oc            */
var C = {
  // 亞洲
  4:  ["阿富汗","Afghanistan","🇦🇫","喀布爾",["普什圖語","達利語"],"asia"],
  51: ["亞美尼亞","Armenia","🇦🇲","葉里溫",["亞美尼亞語"],"asia"],
  31: ["亞塞拜然","Azerbaijan","🇦🇿","巴庫",["亞塞拜然語"],"asia"],

function L(id){ return C[+id]||null; }

function gcf(id){ var d=L(id); return d?(RCOL[d[5]]||"#7a8a90"):"#506070"; }

function rcolor(){
  if(!gEl) return;
  var isQ=S.mode==="quiz"&&S.q.active;
  var hasRegion=!isQ&&S.region&&S.region!=="all";
  var hasSel=!isQ&&!!S.selId&&S.lview==="list";

  gEl.selectAll(".cp").each(function(d){
    var el=d3.select(this);
    var id=+d.id;
    if(isQ){
      var cur=id===S.q.curId;
      el.attr("fill",cur?"#ff6820":"#243040").attr("opacity",cur?1:0.22);
      el.classed("sel",false).classed("hl",cur).classed("dim",false);
    } else {
      el.attr("fill",gcf(id)).attr("opacity",null);
      el.classed("sel",id===S.selId).classed("hl",false);
      var cd=L(id);
      var rDim=hasRegion&&!(cd&&cd[5]===S.region);
      var sDim=hasSel&&id!==S.selId;
      el.classed("dim",rDim||sDim);
    }
  });
  /* 標籤 dim（從 datum 讀 id，避免 getAttribute）*/
  svgEl.select(".lg").selectAll(".lb-g").each(function(d){
    var dim=showLabels&&S.selId&&d.id!==S.selId&&S.lview==="list";

function zoomTo(intId){
  if(!S.worldData) return;
  var geoms=S.worldData.objects.countries.geometries;
  var g=geoms.find(function(x){return+x.id===intId;});
  if(!g) return;
  var feat=topojson.feature(S.worldData,g);
  var bounds=pfn.bounds(feat);
  if(!bounds||!isFinite(bounds[0][0])) return;
  var bw=bounds[1][0]-bounds[0][0], bh=bounds[1][1]-bounds[0][1];
  var cx=(bounds[0][0]+bounds[1][0])/2, cy=(bounds[0][1]+bounds[1][1])/2;
  var sc=Math.max(1.0, Math.min(40,0.78/Math.max(bw/W,bh/H)));
  /* 找最近的世界副本：依據目前螢幕中心位置決定跳往哪個副本
     避免在左右滑動後跳回原始世界（0~W 投影座標）              */
  var curT=d3.zoomTransform(svgEl.node());
  var viewCx=(W/2-curT.x)/curT.k;
  var n=Math.round((viewCx-cx)/W);
  var adjCx=cx+n*W;
  svgEl.transition().duration(600)
    .call(zbeh.transform,d3.zoomIdentity.translate(W/2-sc*adjCx,H/2-sc*cy).scale(sc));
}

function resetZoom(){
  if(svgEl) svgEl.transition().duration(500).call(zbeh.transform,d3.zoomIdentity);
}
function toggleLabels(){
  showLabels=!showLabels;
  if(svgEl) svgEl.select(".lg").style("display",showLabels?null:"none");

}

function setMode(m){

  document.getElementById("tquiz").classList.toggle("on",m==="quiz");
  document.getElementById("rbar").style.display=m==="learn"?"flex":"none";
  rcolor(); resetZoom();

function setRegion(btn,r){
  S.region=r; S.selId=null;
  document.querySelectorAll(".rp").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on"); rcolor(); updBdg();
  if(S.mode==="learn") renderLearn();
  if(!proj||!zbeh||!svgEl) return;
  if(r==="all"){ resetZoom(); return; }
  var cv=CONT_VIEW[r]; if(!cv) return;
  /* proj([lon, lat]) 轉換為地圖投影座標 */
  var lc=proj([cv.lon, cv.lat]);
  if(!lc||!isFinite(lc[0])) return;
  var cx=lc[0], cy=lc[1], sc=cv.sc;
  /* 與 zoomTo 相同：找最近的世界副本，避免跳回原始位置 */
  var curT=d3.zoomTransform(svgEl.node());
  var viewCx=(W/2-curT.x)/curT.k;
  var n=Math.round((viewCx-cx)/W);
  var adjCx=cx+n*W;
  svgEl.transition().duration(700)
    .call(zbeh.transform, d3.zoomIdentity.translate(W/2-sc*adjCx, H/2-sc*cy).scale(sc));
}

function getPool(reg){
  if(_poolCache[reg]) return _poolCache[reg];
  var pool=Object.entries(C)
    .filter(function(e){return reg==="all"||e[1][5]===reg;})
    .map(function(e){return{id:+e[0],d:e[1]};});
  _poolCache[reg]=pool;
  return pool;
}
function startQuiz(){S.q.active=true;S.q.correct=0;S.q.total=0;S.q.streak=0;nextQ();}
function quickQuiz(intId){
  setMode("quiz");
  setTimeout(function(){
    var cd=L(intId);S.q.active=true;S.q.correct=0;S.q.total=0;S.q.streak=0;
    S.q.region=cd?cd[5]:"all";nextQ(intId);
  },80);
}
function nextQ(fid){
  var pool=getPool(S.q.region);
  if(pool.length<4){alert("此範圍國家不足，請選其他範圍");return;}
  var tgt;
  if(fid!=null) tgt=pool.find(function(p){return p.id===fid;})||pool[Math.floor(Math.random()*pool.length)];
  else tgt=pool[Math.floor(Math.random()*pool.length)];
  S.q.curId=tgt.id; S.q.answered=false;
  var types=S.q.type==="mixed"?["name","capital","flag","lang"]:[S.q.type];
  S.q.qType=types[Math.floor(Math.random()*types.length)];
  var others=pool.filter(function(p){return p.id!==tgt.id;}).sort(function(){return Math.random()-.5;}).slice(0,3);
  S.q.opts=[tgt].concat(others).sort(function(){return Math.random()-.5;});
  rcolor();zoomTo(tgt.id);renderQ();
}
function optTxt(opt,qt){
  var d=opt.d;
  if(qt==="name") return d[2]+" "+d[0];
  if(qt==="capital") return d[3];
  if(qt==="flag") return d[2];
  return d[4][0];
}
function renderQ(){
  var q=S.q,cd=L(q.curId);
  var qTxt={name:"地圖上橘色標示的是哪個國家？",capital:"這個國家的首都是哪裡？",flag:"這個國家的國旗是哪一個？",lang:"這個國家的官方語言是什麼？"}[q.qType];
  var qLbl={name:"認國家名稱",capital:"認首都",flag:"認國旗",lang:"認語言"}[q.qType];
  var pct=q.total>0?Math.round(q.correct/q.total*100):0;
  var strkH=q.streak>=2?'<span class="strk">🔥 '+q.streak+' 連勝</span>':"";
  var optsH=q.opts.map(function(opt){
    return'<button class="ob'+(q.qType==="flag"?" flgo":"")+'" data-oid="'+opt.id
      +'" onclick="handleAns('+opt.id+')">'+optTxt(opt,q.qType)+'</button>';
  }).join("");
  document.getElementById("panel").innerHTML=
    '<div class="qhdr"><div class="sc"><span class="scn">'+q.correct+'</span> / '+q.total+'</div>'
    +strkH+'<button class="quitb" onclick="quitQuiz()">結束</button></div>'
    +'<div class="pgbar"><div class="pgfill" style="width:'+pct+'%"></div></div>'
    +'<div class="qbody"><div class="qtlbl">'+qLbl+'</div>'
    +'<div class="qtxt">'+qTxt+'</div>'
    +'<div class="hint">👆 留意地圖上橘色標示的區域</div>'
    +'<div class="ogrid">'+optsH+'</div>'
    +'<div id="fb" style="display:none"></div></div>';
}
function handleAns(selId){
  if(S.q.answered) return;
  S.q.answered=true;S.q.total++;
  var ok=selId===S.q.curId;
  if(ok){S.q.correct++;S.q.streak++;}else{S.q.streak=0;}
  document.querySelectorAll(".ob").forEach(function(b){
    var bid=+b.dataset.oid;b.disabled=true;
    if(bid===S.q.curId)b.classList.add("ok");
    else if(bid===selId&&!ok)b.classList.add("ng");
  });
  var cd=L(S.q.curId);
  var fb=document.getElementById("fb");
  fb.style.display="flex"; fb.className="fb "+(ok?"ok":"ng");
  if(ok){
    fb.innerHTML='<span style="font-size:16px">✅</span><div><div style="font-weight:600">答對了！</div>'
      +'<div style="font-size:11px;margin-top:2px">首都：'+cd[3]+'　語言：'+cd[4][0]+'</div></div>';
  }else{
    fb.innerHTML='<span style="font-size:16px">❌</span><div><div style="font-weight:600">答錯了</div>'
      +'<div style="font-size:11px;margin-top:2px">正確答案：'+cd[2]+' '+cd[0]+'（首都：'+cd[3]+'）</div></div>';
  }

/* ── 地圖初始化 ── */
async function initMap(){
  var wrap=document.getElementById("mwrap");
  W=wrap.clientWidth||800; H=wrap.clientHeight||500;
  svgEl=d3.select("#msvg");
  tipEl=document.getElementById("tip");
  mwrapEl=wrap;

  proj=d3.geoMercator()
    .scale(W/(2*Math.PI)).translate([W/2,H/2+60]);
  pfn=d3.geoPath().projection(proj);

  /* ── Zoom handler ──────────────────────────────────────────────────
     translateExtent: 限制上下滾動，避免滑到空白區域
     n0 算法：根據 viewport 位置計算三個 tile 應在的「世界索引」
     ─────────────────────────────────────────────────────────────── */
  zbeh=d3.zoom()
    .scaleExtent([1,50])          /* 最小 1x：世界恰好填滿 viewport，永不出現重複國家 */
    .extent([[0,0],[W,H]])
    .translateExtent([[-Infinity,-H*0.3],[Infinity,H*1.3]])
    .on("zoom",function(e){
      var k=e.transform.k,tx=e.transform.x,ty=e.transform.y,kW=k*W;
      var n0=Math.floor(-tx/kW)-1;
      gEl.attr("transform",e.transform);
      /* 光暈 stdDeviation 反比縮放，保持恆定螢幕像素大小 */
      var invK=1/k;
      if(_glowBlur["glow-hov"]) _glowBlur["glow-hov"].attr("stdDeviation",Math.max(0.2,2.5*invK));
      if(_glowBlur["glow-sel"]) _glowBlur["glow-sel"].attr("stdDeviation",Math.max(0.2,4.5*invK));
      if(_glowBlur["glow-quiz"]) _glowBlur["glow-quiz"].attr("stdDeviation",Math.max(0.2,5.5*invK));
      /* 所有 tile（含河流/湖泊/行政區）一起移動 */
      for(var ti=0;ti<tileRefs.length;ti++){
        tileOff[ti]=(n0+ti)*W;
        tileRefs[ti].attr("transform","translate("+tileOff[ti]+",0)");
      }
      /* 標籤環繞：帶到最接近螢幕中央（座標從 datum 讀取，省去每幀 getAttribute）*/
      function repos(sel){
        sel.attr("transform",function(d){
          var px=k*d.ox+tx,py=k*d.oy+ty;
          while(px>W/2+kW/2) px-=kW;
          while(px<W/2-kW/2) px+=kW;
          return "translate("+px+","+py+")";
        });
      }
      repos(svgEl.select(".lg").selectAll(".lb-g"));
      repos(svgEl.select(".wlg").selectAll(".wlb-g"));
      repos(svgEl.select(".city-lg").selectAll(".clb-g"));
      /* 國名標籤：依縮放層級隱藏小國，避免低縮放時文字堆疊 */
      svgEl.select(".lg").selectAll(".lb-g").each(function(d){
        var a=d.area||0;
        var show=k>=6||(k>=3&&a>30)||(k>=1.5&&a>150)||(k>=0.9&&a>600)||a>2000;
        this.style.display=show?null:"none";
      });
      /* 首都標籤隨縮放動態顯示 */
      if(LS.cities){
        svgEl.select(".city-lg").selectAll(".clb-g").each(function(d){
          var pop=d.pop;
          var show=(k>=8)||(k>=4&&pop>=300000)||(k>=2.5&&pop>=1e6)||(k>=1.5&&pop>=3e6)||(pop>=8e6);
          this.style.display=show?null:"none";
        });
      }
    });
  svgEl.call(zbeh);

  /* ── SVG glow filters：hover=金色微光, sel=金色強光, quiz=橘色強光 ── */
  var defs=svgEl.append("defs");
  var _glowBlur={};
  function mkGlow(id,color,opacity,blur){
    var f=defs.append("filter").attr("id",id)
      .attr("x","-35%").attr("y","-35%").attr("width","170%").attr("height","170%");
    _glowBlur[id]=f.append("feGaussianBlur").attr("in","SourceAlpha").attr("stdDeviation",blur).attr("result","blur");
    f.append("feFlood").attr("flood-color",color).attr("flood-opacity",opacity).attr("result","c");
    f.append("feComposite").attr("in","c").attr("in2","blur").attr("operator","in").attr("result","glow");
    var m=f.append("feMerge");
    m.append("feMergeNode").attr("in","glow");
    m.append("feMergeNode").attr("in","SourceGraphic");
  }
  mkGlow("glow-hov","#f0d060",0.65,2.5);
  mkGlow("glow-sel","#f0c840",0.92,4.5);
  mkGlow("glow-quiz","#ff9040",0.92,5.5);

  svgEl.append("rect").attr("width",W).attr("height",H).attr("fill","#183858");
  gEl=svgEl.append("g");

  function sf(url){return fetch(url).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}
  function setStatus(txt){var s=document.getElementById("ldg");if(s){var sp=s.querySelector("span");if(sp)sp.textContent=txt;}}
  function toFC(d){
    if(!d) return null;
    if(d.type==="FeatureCollection") return d;
    if(d.type==="Topology"){var ok=Object.keys(d.objects)[0];return topojson.feature(d,d.objects[ok]);}
    return null;
  }

  try{
    var world=await sf("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json");
    if(!world) throw new Error("底圖載入失敗，請確認網路後重新整理");
    S.worldData=world;
    var countries=topojson.feature(world,world.objects.countries);
    var borderMesh=topojson.mesh(world,world.objects.countries);

    setStatus("載入附加圖層…");
    var GH="https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/";
    var [riverData,lakeData,cityData,admin1Data,tzData]=await Promise.all([
      sf(GH+"ne_110m_rivers_lake_centerlines.geojson"),

      sf(GH+"ne_110m_populated_places_simple.geojson"),

      sf(GH+"ne_10m_time_zones.geojson"), /* 實際時區邊界（120個多邊形） */
    ]);
    var rfc=toFC(riverData), lfc=toFC(lakeData);
    var a1fc=toFC(admin1Data);
    var graticule=d3.geoGraticule()();

    
    /* ── 三個統一 master tile（所有圖層都在裡面，一起平移）──
       這樣河流/湖泊/行政邊界/網格都能正確跟隨無限滾動          */
    tileRefs=[]; tileOff=[];
    /* 4 個 tile：確保任何縮放層級下 viewport 都完整覆蓋
       數學：3 個 tile 在 k<1 時可能有縫；4 個保證 k>=0.4 都安全 */
    [-1,0,1,2].forEach(function(off,idx){
      var tile=gEl.append("g").attr("transform","translate("+(off*W)+",0)");
      tileRefs.push(tile); tileOff.push(off*W);

      /* 網格（在最底層）*/
      tile.append("path").datum(graticule).attr("d",pfn)
        .attr("fill","none").attr("stroke","rgba(255,255,255,.055)")
        .attr("stroke-width",.55).attr("pointer-events","none");

      /* 國家填色 */
      var cpaths=tile.selectAll(".cp").data(countries.features).join("path")
        .attr("class","country-path cp").attr("d",pfn)
        .attr("fill",function(d){return gcf(d.id);});

      /* 國家邊界 */
      tile.append("path").datum(borderMesh).attr("d",pfn).attr("class","border-mesh")
        .attr("fill","none").attr("stroke","rgba(255,255,255,.72)").attr("stroke-width",.75)
        .attr("pointer-events","none");

      /* 湖泊 */
      if(lfc&&lfc.features){
        tile.selectAll(".lk").data(lfc.features).join("path").attr("class","lk")
          .attr("d",pfn).attr("fill","#1e4570")
          .attr("stroke","rgba(60,140,210,.5)").attr("stroke-width",.5)

      }

      /* 河流 */
      if(rfc&&rfc.features){
        tile.selectAll(".rv").data(rfc.features).join("path").attr("class","rv")

      if(a1fc&&a1fc.features){

          .attr("d",pfn).attr("fill","none")
          .attr("stroke","rgba(255,255,255,.3)").attr("stroke-width",.5)
          .attr("stroke-dasharray","3 2").attr("pointer-events","none");
      }

      /* 時區（可切換）：使用 Natural Earth 10m 實際時區邊界（120 個多邊形）
         正確呈現台灣 UTC+8 = 馬來西亞 UTC+8 同色；美國各州時區、俄羅斯多時區等
         clipPath: 限制在 tile [0,W] 範圍，避免日期變更線附近的反繞渲染問題    */
      var clipId="tc"+idx;
      tile.append("clipPath").attr("id",clipId)

      var tzGrp=tile.append("g").attr("class","tile-tz")

        tzGrp.selectAll(".tzfill").data(tzData.features).join("path")

      var caps=cityData.features.filter(function(f){
        return f.properties.featurecla==="Admin-0 capital"&&!f.properties.capalt;
      });
      caps.forEach(function(f){
        var enName=f.properties.name;
        var zhName=CITY_ZH[enName]; if(!zhName) return;
        var coords=proj(f.geometry.coordinates);
        if(!coords||!isFinite(coords[0])||!isFinite(coords[1])) return;
        var pop=f.properties.pop_max||0;
        var g=capLg.append("g").attr("class","clb-g")
          .datum({ox:coords[0],oy:coords[1],pop:pop})
          .attr("transform","translate("+coords[0]+","+coords[1]+")")
          .style("display",pop>=1e6?null:"none");
        g.append("text").attr("class","clb")
          .attr("text-anchor","middle").attr("dy","-4")
          .attr("font-size",8).text(zhName);
      });
    }

    document.getElementById("ldg").style.display="none";
    updBdg();
    renderLearn();
